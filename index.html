<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Лабораторна 2</title>
    <style>
        /* Базові стилі для всієї сторінки */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Стилізація центрального банера */
        .banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .banner:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .author {
            margin-top: 15px;
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .description {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="banner">
        <h1>DevOps лабораторна робота 2</h1>
        <div class="author">Виконав: Улітко Ю. М.</div>
        <div class="description">Приклад сайту для CI/CD</div>
    </div>

</body>
</html>
